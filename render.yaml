services:
  - type: web
    name: model-risk-copilot-trial
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: TRIAL_MODE
        value: "true"
      - key: ANTHROPIC_API_KEY
        sync: false
